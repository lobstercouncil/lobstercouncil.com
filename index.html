<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Council</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
    }
    .logo { font-size: 80px; margin-bottom: 24px; }
    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .tagline {
      color: #8b949e;
      font-size: 18px;
      margin-bottom: 32px;
    }
    .coming-soon {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #333;
      border-radius: 100px;
      color: #8b949e;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦞</div>
    <h1>Lobster Council</h1>
    <p class="tagline">Something big is coming.</p>
    <div class="coming-soon">Coming Soon</div>
  </div>
</body>
</html>
