<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Council — The Future of AI-Native Council Governance</title>
  <meta name="description" content="AI-powered. Council-governed. Lobster-approved. Few understand.">
  <meta property="og:title" content="Lobster Council">
  <meta property="og:description" content="Something big is coming. The future of AI-native council governance.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 30%, #0d1117 70%, #0a0a0a 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(232,84,62,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(232,84,62,0.04) 0%, transparent 40%);
      pointer-events: none;
    }
    .container {
      position: relative;
      text-align: center;
      padding: 40px 24px;
      max-width: 800px;
    }
    .logo {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #e8543e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: #8b949e;
      font-size: clamp(16px, 2.5vw, 20px);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .coming-soon {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #333;
      border-radius: 100px;
      color: #8b949e;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .signup-form {
      display: flex;
      gap: 8px;
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
    }
    .signup-form input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: rgba(22,27,34,0.8);
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .signup-form input:focus { border-color: #e8543e; }
    .signup-form button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: #e8543e;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .signup-form button:hover { background: #d4784a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦞</div>
    <h1>Lobster Council</h1>
    <p class="tagline">AI-powered. Council-governed. Lobster-approved.</p>
    <div class="coming-soon">Something Big Is Coming</div>
    <form class="signup-form" onsubmit="event.preventDefault(); this.querySelector('button').textContent = 'You\'re in 🦞'; this.querySelector('input').disabled = true;">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Join the Council</button>
    </form>
  </div>
</body>
</html>
