<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobster Council — The Future of AI-Native Council Governance</title>
  <meta name="description" content="AI-powered. Council-governed. Lobster-approved. Few understand.">
  <meta property="og:title" content="Lobster Council">
  <meta property="og:description" content="Something big is coming. The future of AI-native council governance.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
    }
    .logo { font-size: 80px; margin-bottom: 24px; }
    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .tagline {
      color: #8b949e;
      font-size: 18px;
      margin-bottom: 32px;
    }
    .coming-soon {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #333;
      border-radius: 100px;
      color: #8b949e;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .signup-form {
      display: flex;
      gap: 8px;
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
    }
    .signup-form input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: rgba(22,27,34,0.8);
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .signup-form input:focus { border-color: #e8543e; }
    .signup-form button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: #e8543e;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .signup-form button:hover { background: #d4784a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦞</div>
    <h1>Lobster Council</h1>
    <p class="tagline">AI-powered. Council-governed. Lobster-approved.</p>
    <div class="coming-soon">Something Big Is Coming</div>
    <form class="signup-form" onsubmit="event.preventDefault(); this.querySelector('button').textContent = 'You\'re in 🦞'; this.querySelector('input').disabled = true;">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Join the Council</button>
    </form>
  </div>
</body>
</html>
